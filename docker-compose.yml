services:
  postgres:
    image: postgres:16
    container_name: deaths-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_db_password
      POSTGRES_DB: deathsdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deathsdb"]
      interval: 3s
      retries: 10

volumes:
  pg_data:

