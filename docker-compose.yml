services:
  postgres:
    restart: unless-stopped
    image: postgres:16
    container_name: deaths-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-test_db_password}
      POSTGRES_DB: ${DB_NAME:-deathsdb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deathsdb"]
      interval: 3s
      timeout: 5s
      retries: 10
    networks:
      - deaths-network

  app:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deaths-api
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-deathsdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-test_db_password}
      - DB_PORT=${DB_PORT:-5432}
      - DATA_DIR=/app/data
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./etl:/app/etl
      - ./scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - deaths-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pg_data:

networks:
  deaths-network:
    driver: bridge

